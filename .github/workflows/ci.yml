name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "20"
  REDIS_HOST: ${{ secrets.REDIS_HOST }}
  REDIS_PORT: ${{ secrets.REDIS_PORT }}
  REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
  OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Install UI dependencies
        run: npm install --prefix ui

      - name: TypeScript compile check (backend)
        run: npx tsc --noEmit

      - name: TypeScript compile check (ui)
        run: npx tsc --noEmit -p ui/tsconfig.json

      - name: Lint backend (if present)
        run: npm run lint --if-present

      - name: Lint UI (if present)
        run: npm run lint --if-present --prefix ui

      - name: Run backend tests (if present)
        run: npm test --if-present

      - name: Run UI tests (if present)
        run: npm test --if-present --prefix ui

      - name: Build backend
        run: npm run build

      - name: Build UI
        run: npm run build --prefix ui

  docker:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.push_image) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.GHCR_PUSH == 'true') }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ (github.event_name == 'workflow_dispatch' && inputs.push_image) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.GHCR_PUSH == 'true') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
